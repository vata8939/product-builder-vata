<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lotto Number Generator</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="container">
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">🌙</button>
    <h1>Lotto Number Generator</h1>
    <div id="lotto-numbers" class="lotto-numbers"></div>
    <button id="generate-btn">Generate Numbers</button>

    <hr class="divider">

    <section class="contact-section">
      <h2>제휴 문의</h2>
      <form action="https://formspree.io/f/mnjwjgej" method="POST" class="contact-form">
        <div class="form-group">
          <label for="full-name">성함</label>
          <input type="text" name="name" id="full-name" placeholder="홍길동" required>
        </div>
        <div class="form-group">
          <label for="email-address">이메일 주소</label>
          <input type="email" name="_replyto" id="email-address" placeholder="email@example.com" required>
        </div>
        <div class="form-group">
          <label for="subject">문의 유형</label>
          <select name="subject" id="subject">
            <option value="Partnership">제휴 제안</option>
            <option value="Inquiry">일반 문의</option>
            <option value="Other">기타</option>
          </select>
        </div>
        <div class="form-group">
          <label for="message">문의 내용</label>
          <textarea rows="5" name="message" id="message" placeholder="문의하실 내용을 입력해주세요." required></textarea>
        </div>
        <button type="submit" class="submit-btn">문의 보내기</button>
      </form>
    </section>
  </div>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
